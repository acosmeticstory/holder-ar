<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holder AR · A4 바코드 인쇄 테스트</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eee;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .toolbar{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #ddd}
  .toolbar button{padding:8px 14px;border:1px solid #999;background:#111;color:#fff;border-radius:6px;cursor:pointer;font-size:14px}
  .toolbar span{font-size:13px;color:#555}
  .page{width:210mm;min-height:297mm;margin:12px auto;padding:12mm;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.12)}
  h1{margin:0 0 4mm;font-size:18pt}
  .note{font-size:10pt;color:#555;margin-bottom:8mm;line-height:1.45}
  .samples{display:grid;grid-template-columns:1fr;gap:6mm}
  .sample{min-height:38mm;border:1px dashed #bbb;border-radius:3mm;padding:5mm 6mm;display:grid;grid-template-columns:28mm 1fr;gap:6mm;align-items:center;break-inside:avoid;page-break-inside:avoid}
  .label{align-self:stretch;display:flex;flex-direction:column;justify-content:center}
  .name{font-size:17pt;font-weight:800;line-height:1.05;margin-bottom:2mm}
  .spec{font-size:10pt;font-weight:700;color:#333}
  .ean{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:9pt;color:#555;margin-top:2mm}
  .variants{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7mm;align-items:end}
  .variant{min-height:25mm;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;background:#fff}
  .variant-label{font-size:8pt;font-weight:800;color:#333;margin-bottom:2mm}
  .barcode-area{display:flex;align-items:center;justify-content:center;background:#fff;min-height:19mm}
  .barcode-area svg{display:block;height:auto}
  .w20 svg{width:20mm}
  .w25 svg{width:25mm}
  .w30 svg{width:30mm}

  @page{size:A4;margin:0}
  @media print{
    body{background:#fff}
    .toolbar{display:none}
    .page{margin:0;box-shadow:none}
  }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">A4 인쇄 / PDF 저장</button>
  <span>A4 한 장 구성입니다. 5개 제품 행에 20/25/30mm 바코드를 함께 배치합니다.</span>
</div>
<main class="page">
  <h1>Holder AR · EAN-13 인쇄 테스트 · 20/25/30mm</h1>
  <div class="note">A4 한 장에 5개 제품을 배치했습니다. 각 행에서 20mm, 25mm, 30mm를 비교하세요. 거리 10~15cm에서 시작하고, 스캐너 debug의 10초 테스트에서 3초 이내 PASS를 목표로 봅니다.</div>
  <section class="samples" id="samples"></section>
</main>

<script>
const samples = [
  { name: 'Ju 01', ean13: '8800353210956' },
  { name: 'Ju 02', ean13: '8800353210963' },
  { name: 'Ju 03', ean13: '8800353210970' },
  { name: 'Ju 04', ean13: '8800353210987' },
  { name: 'Ju 05', ean13: '8800353210994' }
];
const widths = [20, 25, 30];

function assertEan13(code) {
  if (!/^\d{13}$/.test(code)) throw new Error('EAN-13 must be 13 digits');
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += Number(code[i]) * (i % 2 === 0 ? 1 : 3);
  const check = (10 - (sum % 10)) % 10;
  if (check !== Number(code[12])) throw new Error(`invalid check digit: ${code}`);
}

function ean13Bits(code) {
  assertEan13(code);
  const leftOdd = {0:'0001101',1:'0011001',2:'0010011',3:'0111101',4:'0100011',5:'0110001',6:'0101111',7:'0111011',8:'0110111',9:'0001011'};
  const leftEven = {0:'0100111',1:'0110011',2:'0011011',3:'0100001',4:'0011101',5:'0111001',6:'0000101',7:'0010001',8:'0001001',9:'0010111'};
  const right = {0:'1110010',1:'1100110',2:'1101100',3:'1000010',4:'1011100',5:'1001110',6:'1010000',7:'1000100',8:'1001000',9:'1110100'};
  const parity = {0:'OOOOOO',1:'OOEOEE',2:'OOEEOE',3:'OOEEEO',4:'OEOOEE',5:'OEEOOE',6:'OEEEOO',7:'OEOEOE',8:'OEOEEO',9:'OEEOEO'};
  let bits = '101';
  const p = parity[Number(code[0])];
  for (let i = 1; i <= 6; i++) bits += p[i - 1] === 'O' ? leftOdd[Number(code[i])] : leftEven[Number(code[i])];
  bits += '01010';
  for (let i = 7; i <= 12; i++) bits += right[Number(code[i])];
  return bits + '101';
}

function renderEan13Svg(code) {
  const bits = ean13Bits(code);
  const moduleW = 2;
  const margin = 12;
  const barH = 92;
  const w = bits.length * moduleW + margin * 2;
  const h = barH + margin * 2;
  let rects = `<rect width="${w}" height="${h}" fill="#fff"/>`;
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') rects += `<rect x="${margin + i * moduleW}" y="${margin}" width="${moduleW}" height="${barH}" fill="#000"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-label="EAN-13 ${code}">${rects}</svg>`;
}

document.getElementById('samples').innerHTML = samples.map(s => `
  <article class="sample">
    <div class="label">
      <div class="name">${s.name}</div>
      <div class="spec">20/25/30mm 비교</div>
      <div class="ean">${s.ean13}</div>
    </div>
    <div class="variants">
      ${widths.map(width => `
        <div class="variant">
          <div class="variant-label">${width}mm</div>
          <div class="barcode-area w${width}">${renderEan13Svg(s.ean13)}</div>
        </div>
      `).join('')}
    </div>
  </article>
`).join('');
</script>
</body>
</html>
