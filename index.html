<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Holder AR — acosmeticstory</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--gold:#c8b89a;--bg:#0a0a0a;--card:rgba(255,255,255,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:#fff;overflow:hidden;height:100dvh;width:100vw}

/* ---- Camera ---- */
#camera-view{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;z-index:0}
#scan-overlay{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none}
#scan-frame{width:220px;height:72px;border:2px solid rgba(200,184,154,0.5);border-radius:10px;position:relative;animation:breathe 2.5s ease-in-out infinite;pointer-events:auto;cursor:pointer}
@keyframes breathe{0%,100%{transform:scale(1);border-color:rgba(200,184,154,0.35)}50%{transform:scale(1.03);border-color:rgba(200,184,154,0.6)}}
#scan-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:0.7rem;color:rgba(255,255,255,0.5);white-space:nowrap}

/* ---- Top bar ---- */
#top-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent)}
#brand{font-size:0.72rem;letter-spacing:0.06em;color:rgba(255,255,255,0.7)}
.top-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:0.68rem;padding:5px 11px;border-radius:20px;cursor:pointer}

/* ---- Info Panel ---- */
#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(to top,rgba(10,10,10,0.97) 70%,rgba(10,10,10,0.8));border-top:1px solid rgba(200,184,154,0.12);transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);padding:20px 16px 28px;max-height:65dvh;overflow-y:auto}
#info-panel.show{transform:translateY(0)}
.p-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.p-type-badge{font-size:0.55rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.p-type-badge.ju{background:rgba(200,184,154,0.2);color:var(--gold)}
.p-type-badge.sai{background:rgba(120,180,220,0.2);color:#78b4dc}
#p-name{font-size:1.05rem;font-weight:600}
#p-price{font-size:0.75rem;color:rgba(255,255,255,0.4);margin-bottom:14px}
#p-image-wrap{width:100%;display:flex;justify-content:center;margin-bottom:14px}
#p-image{max-width:260px;max-height:200px;object-fit:contain;border-radius:8px}
#p-actions{display:flex;gap:8px}
#p-actions button{flex:1;padding:10px 0;border-radius:8px;font-size:0.78rem;font-weight:500;cursor:pointer;border:none}
#btn-rescan{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
#btn-buy{background:rgba(200,184,154,0.12);color:var(--gold)}
#btn-more{background:var(--gold);color:var(--bg)}

/* ---- Carousel Modal ---- */
#carousel-modal{position:fixed;inset:0;z-index:100;background:rgba(5,5,5,0.97);display:none;flex-direction:column}
#carousel-modal.open{display:flex}
#c-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
#c-title{font-size:0.9rem;font-weight:600;color:var(--gold)}
#c-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.06)}

/* Swipeable horizontal carousel */
#c-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;touch-action:pan-y}
#c-track{display:flex;gap:0;transition:transform 0.35s cubic-bezier(0.25,1,0.5,1);will-change:transform}
#c-track.dragging{transition:none}
.c-slide{flex:0 0 80vw;max-width:360px;display:flex;flex-direction:column;align-items:center;padding:0 10px}
.c-slide-img-wrap{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden}
.c-slide-img-wrap img{max-width:88%;max-height:88%;object-fit:contain}
.c-slide-name{font-size:0.85rem;font-weight:600;margin-bottom:4px}
.c-slide-sub{font-size:0.65rem;color:rgba(255,255,255,0.35)}
.c-slide-buy{margin-top:10px;padding:8px 24px;border-radius:20px;border:1px solid rgba(200,184,154,0.3);background:none;color:var(--gold);font-size:0.7rem;cursor:pointer;text-decoration:none;display:inline-block}

/* Dots */
#c-dots{display:flex;gap:6px;justify-content:center;padding:16px 0 24px}
.c-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s}
.c-dot.active{background:var(--gold);width:18px;border-radius:3px}

/* ---- Grid Panel ---- */
#grid-panel{position:fixed;inset:0;z-index:50;background:rgba(5,5,5,0.97);display:none;flex-direction:column;overflow-y:auto}
#grid-panel.open{display:flex}
#grid-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:rgba(5,5,5,0.97);z-index:1}
#grid-header span{font-size:0.82rem;font-weight:600}
.g-tabs{display:flex;gap:6px}
.g-tab{padding:4px 12px;border-radius:14px;font-size:0.65rem;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(255,255,255,0.5);cursor:pointer}
.g-tab.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
#grid-close{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer}
#grid-body{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
.grid-item{text-align:center;cursor:pointer;border-radius:12px;padding:10px;background:var(--card);transition:background 0.2s}
.grid-item:active{background:rgba(200,184,154,0.08)}
.grid-item img{width:100%;aspect-ratio:1;object-fit:contain;border-radius:8px}
.grid-item .gi-name{font-size:0.72rem;font-weight:500;margin-top:6px}
.grid-item .gi-price{font-size:0.6rem;color:rgba(255,255,255,0.35);margin-top:2px}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(200,184,154,0.92);color:var(--bg);padding:8px 18px;border-radius:20px;font-size:0.72rem;font-weight:500;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="scan-overlay">
  <div id="scan-frame" onclick="demoNext()">
    <div id="scan-label">홀더 패턴에 카메라를 비춰주세요</div>
  </div>
</div>

<div id="top-bar">
  <div id="brand">HOLDER AR</div>
  <button class="top-btn" onclick="toggleGrid()">전체 보기</button>
</div>

<div id="info-panel">
  <div class="p-head">
    <span id="p-badge" class="p-type-badge ju">JU</span>
    <span id="p-name"></span>
  </div>
  <div id="p-price"></div>
  <div id="p-image-wrap"><img id="p-image" src="" alt="product"></div>
  <div id="p-actions">
    <button id="btn-rescan" onclick="hideProduct()">다시 스캔</button>
    <button id="btn-buy" onclick="buyProduct()">구매하기</button>
    <button id="btn-more" onclick="openCarousel()">더 보기</button>
  </div>
</div>

<div id="carousel-modal">
  <div id="c-header">
    <span id="c-title">Holder Collection</span>
    <button id="c-close" onclick="closeCarousel()">×</button>
  </div>
  <div id="c-main">
    <div id="c-track"></div>
  </div>
  <div id="c-dots"></div>
</div>

<div id="grid-panel">
  <div id="grid-header">
    <span>Holder Collection</span>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="g-tabs">
        <button class="g-tab active" onclick="filterGrid('all',this)">ALL</button>
        <button class="g-tab" onclick="filterGrid('ju',this)">JU</button>
        <button class="g-tab" onclick="filterGrid('sai',this)">SAI</button>
      </div>
      <button id="grid-close" onclick="toggleGrid()">×</button>
    </div>
  </div>
  <div id="grid-body"></div>
</div>

<div id="toast"></div>

// ============================================================
// CAMERA
// ============================================================
async function startCamera(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    document.getElementById('camera-view').srcObject=s;
  }catch(e){
    document.getElementById('scan-label').textContent='카메라 없음 — 탭하여 데모 / 전체 보기';
  }
}

// ============================================================
// PRODUCT DISPLAY
// ============================================================
let currentIdx=-1;

function showProduct(idx){
  currentIdx=idx;
  const p=products[idx];
  document.getElementById('p-badge').textContent=p.type.toUpperCase();
  document.getElementById('p-badge').className='p-type-badge '+p.type;
  document.getElementById('p-name').textContent=p.name;
  document.getElementById('p-price').textContent=p.price;
  document.getElementById('p-image').src=p.images[0];
  document.getElementById('info-panel').classList.add('show');
  document.getElementById('scan-overlay').style.display='none';
  if(navigator.vibrate)navigator.vibrate(50);
}

function hideProduct(){
  currentIdx=-1;
  document.getElementById('info-panel').classList.remove('show');
  document.getElementById('scan-overlay').style.display='flex';
}

function buyProduct(){
  if(currentIdx<0)return;
  window.open(SHOP+products[currentIdx].handle,'_blank');
}

function demoNext(){showProduct(demoI%products.length);demoI++;}

  const dots=document.getElementById('c-dots');

  cSlideIdx=startIdx;

  // Build slides for ALL products
  track.innerHTML='';
  dots.innerHTML='';
  products.forEach((p,i)=>{
    // Slide
    const slide=document.createElement('div');
    slide.className='c-slide';
    slide.style.minWidth=SLIDE_W()+'px';

    const imgWrap=document.createElement('div');
    imgWrap.className='c-slide-img-wrap';
    const img=document.createElement('img');
    img.src=p.images[0];
    img.alt=p.name;
    img.loading=i<5?'eager':'lazy';
    imgWrap.appendChild(img);

    // Mini gallery row if multiple images
    if(p.images.length>1){
      imgWrap.style.cursor='pointer';
      let imgIdx=0;
      imgWrap.onclick=(e)=>{
        e.stopPropagation();
        imgIdx=(imgIdx+1)%p.images.length;
        img.src=p.images[imgIdx];
      };
    }

    const name=document.createElement('div');
    name.className='c-slide-name';
    name.textContent=p.name;

    const sub=document.createElement('div');
    sub.className='c-slide-sub';
    sub.textContent=p.type.toUpperCase()+' · '+p.price;

    const buy=document.createElement('a');
    buy.className='c-slide-buy';
    buy.textContent='구매하기';
    buy.href=SHOP+p.handle;
    buy.target='_blank';
    buy.onclick=(e)=>e.stopPropagation();

    slide.appendChild(imgWrap);
    slide.appendChild(name);
    slide.appendChild(sub);
    slide.appendChild(buy);
    track.appendChild(slide);

    // Dot
    const dot=document.createElement('div');
    dot.className='c-dot'+(i===cSlideIdx?' active':'');
    dot.onclick=()=>goSlide(i);
    dots.appendChild(dot);
  });

  updateTrack(false);
  modal.classList.add('open');
  bindCarouselTouch();
}

function goSlide(idx){
  cSlideIdx=Math.max(0,Math.min(products.length-1,idx));
  updateTrack(true);
}

function updateTrack(animate){
  const track=document.getElementById('c-track');
  const sw=SLIDE_W();
  const offset=-cSlideIdx*sw+(window.innerWidth-sw)/2;
  if(animate){
    track.classList.remove('dragging');
  }else{
    track.classList.add('dragging');
    requestAnimationFrame(()=>{track.classList.remove('dragging');
      track.style.transform='translateX('+offset+'px)';});
    return;
  }
  track.style.transform='translateX('+offset+'px)';
  // Update dots
  document.querySelectorAll('.c-dot').forEach((d,i)=>{
    d.classList.toggle('active',i===cSlideIdx);
  });
}

function bindCarouselTouch(){
  const main=document.getElementById('c-main');
  const track=document.getElementById('c-track');

  const onStart=(x)=>{cDragging=true;cDragStartX=x;cDragCurrentX=x;cStartTime=Date.now();track.classList.add('dragging');};
  const onMove=(x)=>{
    if(!cDragging)return;
    cDragCurrentX=x;
    const dx=cDragCurrentX-cDragStartX;
    const sw=SLIDE_W();
    const base=-cSlideIdx*sw+(window.innerWidth-sw)/2;
    track.style.transform='translateX('+(base+dx)+'px)';
  };
  const onEnd=()=>{
    if(!cDragging)return;
    cDragging=false;
    track.classList.remove('dragging');
    const dx=cDragCurrentX-cDragStartX;
    const dt=Date.now()-cStartTime;
    const velocity=dx/Math.max(dt,1);

    // Snap: if fast swipe or dragged > 25%
    if(Math.abs(velocity)>0.4||Math.abs(dx)>SLIDE_W()*0.25){
      if(dx<0)goSlide(cSlideIdx+1);
      else goSlide(cSlideIdx-1);
    }else{
      goSlide(cSlideIdx);
    }
  };

  main.ontouchstart=(e)=>onStart(e.touches[0].clientX);
  main.ontouchmove=(e)=>{e.preventDefault();onMove(e.touches[0].clientX);};
  main.ontouchend=onEnd;
  main.onpointerdown=(e)=>{if(e.pointerType==='mouse'){onStart(e.clientX);main.setPointerCapture(e.pointerId);}};
  main.onpointermove=(e)=>{if(e.pointerType==='mouse')onMove(e.clientX);};
  main.onpointerup=(e)=>{if(e.pointerType==='mouse')onEnd();};
}

function closeCarousel(){
  document.getElementById('carousel-modal').classList.remove('open');
}

// ============================================================
// GRID
// ============================================================
let gridBuilt=false, gridFilter='all';

function toggleGrid(){
  const p=document.getElementById('grid-panel');
  if(p.classList.contains('open')){p.classList.remove('open');return;}
  if(!gridBuilt)buildGrid();
  p.classList.add('open');
}

function buildGrid(){
  const body=document.getElementById('grid-body');
  body.innerHTML='';
  products.forEach((p,i)=>{
    if(gridFilter!=='all'&&p.type!==gridFilter)return;
    const item=document.createElement('div');
    item.className='grid-item';
    item.onclick=()=>{toggleGrid();showProduct(i);};

    const img=document.createElement('img');
    img.src=p.images[0];
    img.alt=p.name;
    img.loading='lazy';

    const name=document.createElement('div');
    name.className='gi-name';
    name.textContent=p.name;

    const price=document.createElement('div');
    price.className='gi-price';
    price.textContent=p.price;

    item.appendChild(img);
    item.appendChild(name);
    item.appendChild(price);
    body.appendChild(item);
  });
  gridBuilt=true;
}

function filterGrid(type,btn){
  gridFilter=type;
  document.querySelectorAll('.g-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  gridBuilt=false;
  buildGrid();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

window.addEventListener('DOMContentLoaded',()=>{
  startCamera();
  showToast('JU 10종 + SAI 10종 로드 완료');
});
