<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Holder AR · EAN-13 테스트 시트</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:16px;background:#f5f5f5;color:#111}
  h1{margin:0 0 4px;font-size:18px}
  .meta{font-size:12px;color:#666;margin-bottom:16px}
  .toolbar{position:sticky;top:0;background:#fff;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .toolbar button{padding:6px 12px;border:1px solid #888;background:#fff;border-radius:6px;cursor:pointer;font-size:13px}
  .toolbar button:hover{background:#eee}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;page-break-inside:avoid;break-inside:avoid}
  .card .name{font-weight:600;font-size:14px;margin:0 0 6px}
  .card .handle{font-size:10px;color:#888;margin-bottom:8px;font-family:monospace}
  .card svg{width:100%;height:80px;display:block}
  .card .ean{font-family:monospace;font-size:11px;color:#444;margin-top:4px;letter-spacing:1px}
  @media print{
    body{background:#fff;padding:6mm}
    .toolbar,.meta,h1{display:none}
    .grid{grid-template-columns:repeat(3,1fr);gap:6mm}
    .card{border:1px dashed #ccc;padding:6mm 4mm}
    .card svg{height:18mm}
  }
</style>
</head>
<body>
<h1>Holder AR · EAN-13 테스트 시트 (Ju 50종)</h1>
<div class="meta">JsBarcode 3.11.5 / catalog.json 로드 / GS1 Korea prefix 8800353 / 2026-05-11</div>
<div class="toolbar">
  <button onclick="window.print()">인쇄 / PDF 저장</button>
  <button onclick="document.body.classList.toggle('big')">큰 사이즈 토글</button>
  <span style="font-size:12px;color:#666">A4 3열 그리드 · 스마트폰 카메라 스캔 가능한 크기</span>
</div>
<div class="grid" id="grid"></div>
<style id="big-style">body.big .grid{grid-template-columns:repeat(2,1fr)} body.big .card svg{height:120px}</style>
<script>
(async () => {
  const res = await fetch('./catalog.json',{cache:'no-store'});
  const data = await res.json();
  const grid = document.getElementById('grid');
  data.products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="name">${p.name}</div>
      <div class="handle">${p.shopifyHandle}</div>
      <svg></svg>
      <div class="ean">${p.ean13}</div>
    `;
    grid.appendChild(card);
    JsBarcode(card.querySelector('svg'), p.ean13, {
      format: 'EAN13',
      width: 2,
      height: 60,
      displayValue: false,
      margin: 4
    });
  });
})();
</script>
</body>
</html>
