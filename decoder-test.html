<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decoder Test · Holder AR</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: #0f0f0f; color: #eee; padding: 20px; }
h1 { font-family: Georgia, serif; font-weight: 400; font-size: 20px; margin-bottom: 6px; }
.sub { color: #888; font-size: 13px; margin-bottom: 24px; }
.case {
  background: #181818; border: 1px solid #2a2a2a; border-radius: 10px;
  padding: 14px; margin-bottom: 14px;
}
.case h3 { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; letter-spacing: 1px; }
.pill.pass { background: #1f5a3a; color: #a8ffb8; }
.pill.fail { background: #5a1f1f; color: #ffa8a8; }
.case .flex { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.case img, .case canvas { border-radius: 6px; border: 1px solid #2a2a2a; }
.case img { max-width: 240px; max-height: 180px; object-fit: contain; background: #222; }
.case canvas { background: #222; }
.row { font-family: ui-monospace, monospace; font-size: 11px; color: #aaa; margin: 3px 0; }
.row .k { color: #888; display: inline-block; width: 90px; }
.row .v { color: #ddd; }
.row.diff .v { color: #ff9090; }
.row.ok .v { color: #90ffa8; }
.stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
.stats .stat { background: #181818; padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2a2a; }
.stats .stat .k { font-size: 10px; color: #888; letter-spacing: 1px; }
.stats .stat .v { font-size: 20px; font-family: Georgia, serif; color: #fff; }
button { background: #c8b89a; color: #000; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font: inherit; font-size: 13px; font-weight: 500; }
button.ghost { background: none; color: #c8b89a; border: 1px solid #c8b89a; }
.toolbar { margin-bottom: 20px; display: flex; gap: 10px; }
</style>
</head>
<body>

<h1>Decoder self-test</h1>
<p class="sub">네 개의 샘플 SVG를 <code>&lt;img&gt;</code>로 로드한 뒤 canvas에 그려서 디코더에 그대로 먹임. 카메라 없이 순수 디코딩 로직만 검증.</p>

<div class="toolbar">
  <button id="run">▶ 전체 재실행</button>
  <button id="tweak" class="ghost">디코더 파라미터 확인</button>
</div>

<div class="stats" id="stats"></div>
<div id="out"></div>

<script>
/* ==================================================================
   Decoder — same as webapp/ar-scan.html, must stay in sync
   ================================================================== */
const PALETTE = [
  [61, 90, 76], [107, 76, 59], [26, 26, 26], [90, 90, 88], [138, 133, 120]
];
const N_CELLS = 14;

function isBg(r, g, b) {
  const avg = (r + g + b) / 3;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  return avg > 175 && (max - min) < 40;
}
function rgbToPaletteIdx(r, g, b) {
  let bd = Infinity, bi = 0;
  for (let i = 0; i < PALETTE.length; i++) {
    const dr = r - PALETTE[i][0], dg = g - PALETTE[i][1], db = b - PALETTE[i][2];
    const d = dr*dr + dg*dg + db*db;
    if (d < bd) { bd = d; bi = i; }
  }
  return bi;
}

function decodeStrip(imgData, mode, debug) {
  const { data, width, height } = imgData;
  const px = (x, y) => ((y | 0) * width + (x | 0)) * 4;

  // Row activity + transitions
  const rowAct = new Int32Array(height);
  const rowTrans = new Int32Array(height);
  for (let y = 0; y < height; y++) {
    let a = 0, t = 0;
    let prevBg = true;
    for (let x = 0; x < width; x++) {
      const i = px(x, y);
      const bg = isBg(data[i], data[i+1], data[i+2]);
      if (!bg) a++;
      if (x > 0 && bg !== prevBg) t++;
      prevBg = bg;
    }
    rowAct[y] = a;
    rowTrans[y] = t;
  }

  const actMin = Math.max(width * 0.03, 6);
  const transMin = 8;
  const runs = [];
  let rs = -1, rp = 0;
  for (let y = 0; y < height; y++) {
    if (rowAct[y] > actMin && rowTrans[y] >= transMin) {
      if (rs < 0) rs = y;
      if (rowTrans[y] > rp) rp = rowTrans[y];
    } else if (rs >= 0) {
      runs.push({ yStart: rs, yEnd: y - 1, peak: rp, len: y - rs });
      rs = -1; rp = 0;
    }
  }
  if (rs >= 0) runs.push({ yStart: rs, yEnd: height - 1, peak: rp, len: height - rs });
  const good = runs.filter(r => r.len >= 6).sort((a,b) => b.len * b.peak - a.len * a.peak);
  if (good.length === 0) { if (debug) { debug.err = 'no_strip'; debug.runs = runs.length; } return null; }
  const strip = good[0];
  const yStart = strip.yStart, yEnd = strip.yEnd;
  if (debug) { debug.yStart = yStart; debug.yEnd = yEnd; debug.peakVal = strip.peak; debug.runs = runs.length; }

  // Column activity (inside strip rows)
  const colAct = new Int32Array(width);
  for (let x = 0; x < width; x++) {
    let c = 0;
    for (let y = yStart; y <= yEnd; y++) {
      const i = px(x, y);
      if (!isBg(data[i], data[i+1], data[i+2])) c++;
    }
    colAct[x] = c;
  }

  // Horizontal bounds
  const colMin = Math.max((yEnd - yStart + 1) * 0.08, 2);
  let xStart = -1, xEnd = -1;
  for (let x = 0; x < width; x++) if (colAct[x] >= colMin) { if (xStart < 0) xStart = x; xEnd = x; }
  if (xStart < 0 || xEnd - xStart < 40) { if (debug) debug.err = 'strip_too_narrow'; return null; }

  // Validate: gaps between bars
  let bgCols = 0;
  for (let x = xStart; x <= xEnd; x++) if (colAct[x] < 2) bgCols++;
  const bgRatio = bgCols / (xEnd - xStart + 1);
  if (bgRatio < 0.15) { if (debug) { debug.err = 'solid(bg=' + bgRatio.toFixed(2) + ')'; debug.xStart = xStart; debug.xEnd = xEnd; } return null; }

  if (debug) { debug.xStart = xStart; debug.xEnd = xEnd; debug.bgRatio = bgRatio; }

  const stripW = xEnd - xStart + 1;
  const cellW = stripW / N_CELLS;
  const stripH = yEnd - yStart + 1;

  const code = new Array(N_CELLS);
  const cellDebug = [];
  let okCells = 0;

  for (let c = 0; c < N_CELLS; c++) {
    const cx0 = Math.round(xStart + c * cellW);
    const cx1 = Math.round(xStart + (c + 1) * cellW);
    let cr = 0, cg = 0, cb = 0, cnt = 0;
    const yInset = Math.floor(stripH * 0.1);
    for (let y = yStart + yInset; y <= yEnd - yInset; y++) {
      for (let x = cx0; x < cx1; x++) {
        const i = px(x, y);
        const r = data[i], g = data[i+1], b = data[i+2];
        if (!isBg(r, g, b)) { cr += r; cg += g; cb += b; cnt++; }
      }
    }
    if (cnt < 3) { code[c] = -1; cellDebug.push({ cnt: 0 }); continue; }
    const mr = cr / cnt, mg = cg / cnt, mb = cb / cnt;
    const colorIdx = rgbToPaletteIdx(mr, mg, mb);
    const cellArea = (cx1 - cx0) * (stripH - 2 * yInset);
    const ratio = cnt / cellArea;

    let sizeIdx;
    if (mode === 'bar') {
      if (ratio > 0.27) sizeIdx = 0;
      else if (ratio > 0.16) sizeIdx = 1;
      else sizeIdx = 2;
    } else {
      if (ratio > 0.095) sizeIdx = 0;
      else if (ratio > 0.04) sizeIdx = 1;
      else sizeIdx = 2;
    }
    code[c] = sizeIdx * 5 + colorIdx;
    okCells++;
    cellDebug.push({ cnt, ratio: ratio.toFixed(3), sizeIdx, colorIdx, mr:Math.round(mr), mg:Math.round(mg), mb:Math.round(mb) });
  }
  if (debug) debug.cells = cellDebug;
  if (okCells < N_CELLS - 1) return null;
  for (let c = 0; c < N_CELLS; c++) if (code[c] < 0) code[c] = c > 0 ? code[c-1] : code[c+1] || 0;

  // Reject uniform codes
  const freq = {};
  for (const v of code) freq[v] = (freq[v] || 0) + 1;
  let maxFreq = 0; for (const k in freq) if (freq[k] > maxFreq) maxFreq = freq[k];
  if (maxFreq > N_CELLS * 0.55) { if (debug) debug.err = 'uniform(' + maxFreq + '/' + N_CELLS + ')'; return null; }
  return { code, okCells };
}

/* ==================================================================
   Test fixtures
   ================================================================== */

const CASES = [
  { url: '../examples/ju-46-bar.svg',     mode: 'bar', expect: [0, 7, 11, 3, 9, 14, 1, 6, 12, 4, 8, 13, 2, 5],  name: 'Ju-46 · bar' },
  { url: '../examples/ju-17-bar.svg',     mode: 'bar', expect: [3, 10, 8, 0, 6, 12, 2, 14, 5, 11, 7, 1, 9, 13], name: 'Ju-17 · bar' },
  { url: '../examples/sai15-m01-bar.svg', mode: 'bar', expect: [6, 2, 13, 9, 0, 7, 14, 3, 11, 5, 1, 8, 12, 4],  name: 'SAI15-M01 · bar' },
  { url: '../examples/sai15-m02-bar.svg', mode: 'bar', expect: [11, 4, 7, 0, 13, 6, 2, 9, 14, 1, 12, 5, 10, 8], name: 'SAI15-M02 · bar' },
  { url: '../examples/ju-46-dot.svg',     mode: 'dot', expect: [0, 7, 11, 3, 9, 14, 1, 6, 12, 4, 8, 13, 2, 5],  name: 'Ju-46 · dot' },
  { url: '../examples/ju-17-dot.svg',     mode: 'dot', expect: [3, 10, 8, 0, 6, 12, 2, 14, 5, 11, 7, 1, 9, 13], name: 'Ju-17 · dot' },
  { url: '../examples/sai15-m01-dot.svg', mode: 'dot', expect: [6, 2, 13, 9, 0, 7, 14, 3, 11, 5, 1, 8, 12, 4],  name: 'SAI15-M01 · dot' },
  { url: '../examples/sai15-m02-dot.svg', mode: 'dot', expect: [11, 4, 7, 0, 13, 6, 2, 9, 14, 1, 12, 5, 10, 8], name: 'SAI15-M02 · dot' },
];

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

async function runOne(testCase, idx) {
  const container = document.createElement('div');
  container.className = 'case';
  document.getElementById('out').appendChild(container);

  const statusEl = document.createElement('h3');
  statusEl.innerHTML = `<span>${testCase.name}</span><span class="pill" id="pill-${idx}">실행중…</span>`;
  container.appendChild(statusEl);

  const flex = document.createElement('div');
  flex.className = 'flex';
  container.appendChild(flex);

  try {
    const img = await loadImage(testCase.url);

    // Display the source
    const srcImg = document.createElement('img');
    srcImg.src = testCase.url;
    flex.appendChild(srcImg);

    // Mimic ar-scan.html: feed the FULL 320×500 image downsampled to 640 wide
    // (just like the camera would).
    const cw = 640, ch = Math.round(640 * img.naturalHeight / img.naturalWidth);
    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const cx = canvas.getContext('2d', { willReadFrequently: true });
    cx.fillStyle = '#FAF9F5';
    cx.fillRect(0, 0, cw, ch);
    cx.drawImage(img, 0, 0, cw, ch);
    flex.appendChild(canvas);

    const imgData = cx.getImageData(0, 0, cw, ch);
    const debug = {};
    const result = decodeStrip(imgData, testCase.mode, debug);

    // Build per-cell analysis display
    const info = document.createElement('div');
    info.style.flex = '1 1 280px';
    info.style.minWidth = '280px';

    const pill = document.getElementById(`pill-${idx}`);
    if (!result) {
      pill.textContent = 'FAIL';
      pill.className = 'pill fail';
      info.innerHTML = `<div class="row diff"><span class="k">error</span><span class="v">${debug.err || 'decoder returned null'}</span></div>`;
      if (debug.yStart !== undefined) {
        info.innerHTML += `<div class="row"><span class="k">strip y</span><span class="v">${debug.yStart}..${debug.yEnd} (peak=${debug.peakVal})</span></div>`;
      }
      if (debug.xStart !== undefined) {
        info.innerHTML += `<div class="row"><span class="k">strip x</span><span class="v">${debug.xStart}..${debug.xEnd}</span></div>`;
      }
    } else {
      const got = result.code;
      const exp = testCase.expect;
      const matches = got.every((v, i) => v === exp[i]);
      pill.textContent = matches ? 'PASS' : 'MISMATCH';
      pill.className = 'pill ' + (matches ? 'pass' : 'fail');

      info.innerHTML = `
        <div class="row ${matches?'ok':'diff'}"><span class="k">got</span><span class="v">[${got.join(', ')}]</span></div>
        <div class="row"><span class="k">expected</span><span class="v">[${exp.join(', ')}]</span></div>
        <div class="row"><span class="k">strip y</span><span class="v">${debug.yStart}..${debug.yEnd}</span></div>
        <div class="row"><span class="k">strip x</span><span class="v">${debug.xStart}..${debug.xEnd}</span></div>
        <div class="row"><span class="k">cells ok</span><span class="v">${result.okCells}/14</span></div>
      `;
      if (!matches) {
        const mismatchDetail = got.map((v, i) => {
          if (v === exp[i]) return `<span style="color:#555">[${i}]${v}</span>`;
          const c = debug.cells[i];
          return `<span style="color:#f99">[${i}]${v}≠${exp[i]} (ratio=${c?.ratio}, rgb=${c?.mr},${c?.mg},${c?.mb})</span>`;
        }).join(' ');
        info.innerHTML += `<div class="row"><span class="k">mismatch</span><span class="v">${mismatchDetail}</span></div>`;
      }
    }
    flex.appendChild(info);
    return result && testCase.expect.every((v, i) => result.code[i] === v);
  } catch (e) {
    const pill = document.getElementById(`pill-${idx}`);
    pill.textContent = 'ERROR';
    pill.className = 'pill fail';
    const info = document.createElement('div');
    info.innerHTML = `<div class="row diff"><span class="k">exception</span><span class="v">${e.message}</span></div>`;
    flex.appendChild(info);
    return false;
  }
}

async function runAll() {
  document.getElementById('out').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  let pass = 0, total = CASES.length;
  for (let i = 0; i < CASES.length; i++) {
    const ok = await runOne(CASES[i], i);
    if (ok) pass++;
  }
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="k">PASS</div><div class="v" style="color:${pass===total?'#90ffa8':'#ff9090'}">${pass} / ${total}</div></div>
    <div class="stat"><div class="k">PALETTE</div><div class="v">5 colors</div></div>
    <div class="stat"><div class="k">CELLS</div><div class="v">14</div></div>
    <div class="stat"><div class="k">GLYPHS</div><div class="v">15 (3×5)</div></div>
  `;
}

document.getElementById('run').addEventListener('click', runAll);
document.getElementById('tweak').addEventListener('click', () => {
  alert(
    'Bar thresholds (area ratio):\n' +
    '  thick: > 0.27\n' +
    '  medium: > 0.16\n' +
    '  thin: else\n\n' +
    'Dot thresholds:\n' +
    '  large: > 0.095\n' +
    '  medium: > 0.04\n' +
    '  small: else\n\n' +
    'isBg: avg>200 && (max-min)<25'
  );
});

runAll();
</script>
</body>
</html>
